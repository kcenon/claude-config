  - path: "docs/deep-audit-2026-05-29.md"
    title: "Deep Audit — claude-config (2026-05-29)"
    description: ""
    category: docs
    scope: docs
    size: 139794
    tags: [audit,config,docs]
    sections:
      - {h: "Executive Summary", l: 11, e: 25}
      - {h: "Root-Cause Themes", l: 26, e: 35}
      - {h: "Prioritized Roadmap", l: 36, e: 38}
      - {h: "[P0] Wire the six missing security/memory hooks into settings.windows.json: add bash-sensitive-read-guard.ps1, bash-write-guard.ps1, gh-write-verb-guard.ps1, and traceability-guard.ps1 to the Bash matcher (preserving the POSIX .sh ordering and timeouts), and add memory-write-guard.ps1 (after pre-edit-read-guard.ps1), memory-integrity-check.ps1 (SessionStart), and memory-access-logger.ps1 (PostToolUse Read, async 5s). These .ps1 files already exist and are fully implemented; they are simply unregistered, leaving Windows users with no Bash-channel secret-read/write protection and no memory guarding that the docs claim are active. _(effort: S)_", l: 39, e: 45}
      - {h: "[P0] Fix the case-sensitivity secret-guard bypass in bash-write-guard.sh and bash-sensitive-read-guard.sh: match the .env-family, SSH-key, .aws, .netrc/.npmrc/.pypirc, and system-credential globs against the already-computed $lower (as is already done for *.pem and the secrets/ dirs), mirroring sensitive-file-guard.sh's deliberate case-folding. Add deny fixtures for .ENV/.Env/.Envrc/.NETRC and uppercased SSH-key names to both test corpora. _(effort: S)_", l: 46, e: 52}
      - {h: "[P0] Add CI enforcement that catches the parity gaps this audit found: (1) extend the parity job in validate-hooks-doc.yml to parse both settings files, normalize each hook to its basename, and fail if per-event hook sets diverge except for a documented POSIX-only allowlist; also diff the permissions.allow arrays. (2) Wire the orphaned regression suites into CI — add the three tests/hook-json-escape*.sh suites and the unrun tests/scripts/*.sh suites (especially test-hook-ordering.sh, test-windows-hooks-parity.sh which currently FAILS, and installer-fetch-tests.sh) to validate-hooks.yml/validate-skills.yml. (3) Add a windows-latest (or pwsh) leg that runs tests/hooks/test-runner.ps1 so .ps1 hooks get behavioral execution, not just file-existence parity. _(effort: M)_", l: 53, e: 59}
      - {h: "[P1] Restore behavioral parity in the divergent PowerShell guard logic: (1) merge-gate-guard.ps1 — add the squash-only --merge/--rebase deny block after the scope gate; (2) pr-target-guard.ps1 — block both main and master and resolve the repo default branch (with the override env var) when --base is absent, mirroring the #616 hardening; (3) commit-message-guard.ps1 — replace the broad attribution substring regex with the three-pattern logic (factor a Test-NoAttribution helper from attribution-guard.ps1); (4) memory-write-guard.ps1 — fail-closed on secret-check exit code 2 (#618); (5) LanguageValidator.psm1 — allowlist the English typographic code points (U+2014/2013/201C/201D/2018/2019/2026/00A0) per #583; (6) sensitive-file-guard.ps1 — add SSH-key and .aws cases; (7) bash-write-guard.ps1 — extend Read-before-Edit to argv targets (or document the redirect-only limit). Add or extend the corresponding parity/behavioral tests for each. _(effort: L)_", l: 60, e: 66}
      - {h: "[P1] Establish an enforced SSOT for the plugin reference files and agents. Extend the canonical->mirror map in scripts/check_references.sh + sync_references.sh (and their .ps1 twins) to cover ALL plugin/skills/*/reference/* files that mirror rules/ (not just the 4 project-workflow files), then run sync to re-sync the ~29 currently-drifted copies — including the github-pr-5w1h.md mirror that drifted even within the declared scope. For the 8 near-duplicate agents, add a CI diff that asserts the shared body sections match between plugin/agents and project/.claude/agents (or adopt a body+per-layer-frontmatter overlay generated by sync), reusing the diff -q pattern already proven for hooks/lib/validate-commit-message.sh. _(effort: M)_", l: 67, e: 73}
      - {h: "[P1] Fix the bootstrap.ps1 wrong-settings defect and the silent-data-loss script helpers. (1) bootstrap.ps1 Install-GlobalSettings: source global/settings.windows.json on Windows (mirroring install.ps1:441), not the Unix settings.json whose hooks point at .sh scripts; add a drift test asserting bootstrap.ps1 and install.ps1 select the same settings source per platform. (2) backup.sh and install.sh: make error() exit (or replace `cmd || error` with `cmd || { error; exit 1; }`) for destructive/critical copies; in backup.sh prefer copy-then-swap so a failed copy never leaves a wiped backup directory; fix the same non-exiting pattern in backup.ps1. _(effort: M)_", l: 74, e: 80}
      - {h: "[P1] Fix the github-api-preflight scope-gate overmatch and the markdown-anchor-validator CJK divergence. (1) Anchor the gh detection in github-api-preflight.sh to a word boundary `(^|[[:space:]`(])gh[[:space:]]` (reusing gh-write-verb-guard's pre-filter) so benign words like 'high'/'weigh' no longer trigger a network curl on every Bash call; also drop the `^` anchor on the auth-status branch so `cd x && gh ...` gets the diagnostic. (2) Make markdown-anchor-validator anchor generation Unicode-aware on both sides — switch the .sh from locale-dependent `[:alnum:]` to a perl `\\p{L}\\p{N}\\p{Pc}` transform matching the .ps1, and add Korean/CJK fixtures asserting byte-identical anchors across platforms. _(effort: M)_", l: 81, e: 87}
      - {h: "[P1] Fix the /release multi-track defects and govern the hooks version track. (1) Add `hooks` to the /release --target alternation, argument-hint, Options, and Version Source table; add the hooks consumer to sync_versions and check_versions so --target hooks actually bumps and propagates instead of silently falling back to suite. (2) In release Step 8, use the $TAG_NAME computed in Step 7 for `gh release create` and the Output template, so non-suite releases tag and publish consistently instead of creating a mismatched v$VERSION tag. (3) Either give the hooks track a real consumer (e.g. gen-hooks-md.sh emits a 'Hooks bundle version' line into HOOKS.md and check_versions asserts it) or correct VERSION_MAP.yml line 14 to drop the false 'surfaced to operators' claim and document hooks as an ungoverned label with a SemVer-validity assertion. _(effort: M)_", l: 88, e: 94}
      - {h: "[P2] Reconcile the documentation that drifted from reality, preferring SSOT-derived values over hardcoded literals. Update: COMPATIBILITY.md parity count 32->37 (or derive from the CI-tracked HOOKS.md total), its hook-event table (rename PostToolUseFailure->ToolFailure, add CwdChanged/InstructionsLoaded/TaskCreated/PostCompact rows), and its stale v1.6.0/2026-04-17 footer. Fix HOOKS.md section 12 heading (H2->H3) and rewrite its no-base PR-target behavior to match the shipped #616 default-branch resolution. Sync README.md/README.ko.md Agents tables (add dependency-auditor, test-strategist), the _internal skills trees (add the 6 missing skills; rewrite the ko tree's structure), the hooks trees (replace the hand list of 19 with a pointer to the CI-verified HOOKS.md catalog), and the lib/ subtree listings; align plugin-lite README/plugin-vs-global.md hooks rows and plugin/README structure block with shipped contents. _(effort: L)_", l: 95, e: 101}
      - {h: "[P2] Finalize the expired P4 timeline rollout and harden the dangerous-command-guard allow-shape and JSON-emission consistency. (1) P4: decide the terminal state (flip p4_strict_schema to true and retire the hooks, or remove strict mode), then delete the four p4-timeline hook files, their six settings registrations, the policy file, and the HOOKS.md entries — they currently fire on every Bash/Edit/Write/SessionStart but can never block or print. (2) Convert github-api-preflight.sh and prompt-validator.sh JSON emitters to `jq -nc --arg` to match the rest of the hardened suite. (3) Standardize the dangerous-command-guard allow-path diagnostic field (additionalContext vs permissionDecisionReason) across .sh/.ps1. _(effort: M)_", l: 102, e: 108}
      - {h: "[P2] Add self-documenting loop-safety/side-effect sections and reconcile the tier-preset policy wording. (1) Add a short '### Side Effects and Loop-Safety' note to the 9 loop_safe:false skills that lack one (issue-work, pr-work, release, harness, branch-cleanup, issue-create, implement-all-levels, fleet-orchestrator, sonar-fix) and to traceability (whose loop metadata has no body content), using the evidence-pack section as template; optionally tighten validate_skills.sh to grep only the post-frontmatter body so the drift check cannot be self-satisfied by frontmatter keys. (2) Soften _policy.md line 135 tier presets from 'Required' to 'Recommended; adopted incrementally' with a cross-link to the TOKEN_OPTIMIZATION.md phased rollout (or schedule tier adoption for the ~10 oversized skills). _(effort: M)_", l: 109, e: 115}
      - {h: "[P3] Clean up the remaining low-impact consistency and robustness nits: reconcile fleet-orchestrator flag drift (--retry->--max-retries in the argument-hint, document or remove --dry-run, add --resume to the hint) including the docs/fleet-orchestrator.md copy-paste examples; tighten the Windows git fetch allowlist to the two scoped origin/upstream entries; quote $BACKUP_DIR in backup.sh's ls -A summary checks and add 2>/dev/null to the two missing lines; add a Test-Path guard before bootstrap.sh sources installer-fetch.sh; add an explicit non-interactive (--yes / env-flag + TTY detection) mode to the installers; constrain sync_versions' global \"version\" sed to the first/top-level match plus a uniqueness assertion; document the per-call pwsh cold-start cost in COMPATIBILITY.md; port sync.ps1's missing option-4 interactive merge (or explicitly reject 4); add a behavioral test for conflict-guard.sh; add tests/markdown-anchor-validator/** to the validate-hooks.yml path filter; backfill the CHANGELOG per-version sections at next release; and delete the stale err.log scratch artifact. _(effort: L)_", l: 116, e: 123}
